model:
  provider: Vertex
  name: gemini-2.5-pro
  max_tokens: 100000

task: bin_assignment

nepabench_directory: ./nepabench

benchmark:
  input_file: BinAssign/benchmark.json
  field_mapping:
    bin: bin
    comment: comment
    binning_guidance_file: guidance

evaluation:
  prompt_file: 'prompts/bin_assign.txt'
  continue_previous: true
  eval_kwargs:
    max_attempts: 10
    retry_delay: 60

scoring:
  metrics: 
    - exact_match

output:
  directory: 'results/nepabench_tests/assign_gemini/'
  logfile: 'logs/nepabench_tests/assign_gemini.log'
